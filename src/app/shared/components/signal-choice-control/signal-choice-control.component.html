<fieldset class="choice-control" [disabled]="disabled()">
  <legend>{{ label() }}</legend>

  <div class="choice-list">
    @for (option of options(); track option.value) {
      <button
        type="button"
        class="choice-option"
        [class.choice-option--selected]="value() === option.value"
        [attr.aria-pressed]="value() === option.value"
        [disabled]="disabled()"
        (click)="choose(option)"
        (blur)="markTouched()"
      >
        <span class="choice-label">{{ option.label }}</span>
        <span class="choice-description">{{ option.description }}</span>
      </button>
    }
  </div>
</fieldset>

@if (authService.promptOpen()) {
  <div class="auth-backdrop">
    <section
      class="auth-card"
      [class.auth-card--wobble]="wobble()"
      role="dialog"
      aria-modal="true"
      aria-labelledby="auth-title"
      aria-describedby="auth-description"
      (animationend)="resetWobble()"
    >
      <p class="auth-kicker">Authentication required</p>
      <h2 id="auth-title">Sign in to continue</h2>
      <p id="auth-description">Enter a user name and password to open this workspace page.</p>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <label>
          <span>User name</span>
          <input #usernameInput type="text" autocomplete="username" formControlName="username" />
        </label>

        <label>
          <span>Password</span>
          <span class="password-field">
            <input
              [type]="passwordVisible() ? 'text' : 'password'"
              autocomplete="current-password"
              formControlName="password"
            />
            <button
              type="button"
              class="password-toggle"
              [attr.aria-label]="passwordVisible() ? 'Hide password' : 'Show password'"
              (click)="togglePasswordVisibility()"
            >
              {{ passwordVisible() ? 'Hide' : 'Show' }}
            </button>
          </span>
        </label>

        @if (errorMessage()) {
          <p class="auth-error" role="alert">{{ errorMessage() }}</p>
        }

        <button type="submit" [disabled]="busy()">
          {{ busy() ? 'Checking...' : 'Continue' }}
        </button>
      </form>
    </section>
  </div>
}
